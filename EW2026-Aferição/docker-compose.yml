services:

  mongodb:
    build:
      context: ./ex1
      dockerfile: Dockerfile.mongo
    container_name: mongodb_repairs
    networks:
      - repairs-network

  api:
    build:
      context: ./ex1
      dockerfile: Dockerfile
    container_name: api_dados_repairs
    ports:
      - "16025:16025"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/autoRepair
    depends_on:
      - mongodb
    networks:
      - repairs-network

  interface:
    build:
      context: ./ex2
      dockerfile: Dockerfile.interface
    container_name: interface_repairs
    ports:
      - "16026:16026"
    depends_on:
      - api
    environment:
      - API_URL=http://api_dados_repairs:16025/repairs
    networks:
      - repairs-network

networks:
  repairs-network:
    driver: bridge